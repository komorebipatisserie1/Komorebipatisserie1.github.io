<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木漏れ日 | 森林系甜點工作室</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FDFBF7;
            color: #333333;
            line-height: 1.6;
        }
        header {
            background-color: #4A6741;
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.8em;
            letter-spacing: 3px;
            font-weight: 500;
        }
        header p.subtitle {
            font-size: 1.2em;
            margin-top: 15px;
            font-style: italic;
            opacity: 0.9;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        h2 {
            color: #4A6741;
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            position: relative;
        }
        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #8B5A2B;
            margin: 10px auto 0;
        }
        .products {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 30px 25px;
            flex: 1;
            min-width: 260px;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-align: center;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card h3 {
            color: #8B5A2B;
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .market-info {
            background-color: #F0F4EF;
            border-left: 5px solid #4A6741;
            padding: 25px;
            margin-top: 50px;
            border-radius: 0 8px 8px 0;
        }
        .market-info h3 {
            color: #4A6741;
            margin-top: 0;
        }
        footer {
            background-color: #2C3E26;
            color: #e0e5df;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            header h1 { font-size: 2.2em; }
            .products { flex-direction: column; align-items: center; }
            .product-card { width: 100%; max-width: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>木漏れ日</h1>
        <p class="subtitle">陽光穿透樹葉的溫暖 ｜ 森林系手作甜點</p>
    </header>
    <div class="container">
        <section>
            <h2>關於我們</h2>
            <p style="text-align: center; max-width: 700px; margin: 0 auto; color: #555;">
                在「木漏れ日」，我們用心烘焙每一份甜點。嚴格把關烘焙溫度與水分比例，將森林的純粹與溫暖揉進麵糰裡。
            </p>
        </section>
        <section style="margin-top: 60px;">
            <h2>主推甜點</h2>
            <div class="products">
                <div class="product-card">
                    <h3>手作泡芙</h3>
                    <p>精準控溫烤製的酥脆外殼，搭配飽滿滑順的內餡。</p>
                </div>
                <div class="product-card">
                    <h3>手工餅乾</h3>
                    <p>嚴選食材製作，口感酥脆不膩口。完美的風味平衡。</p>
                </div>
                <div class="product-card">
                    <h3>經典蛋黃酥</h3>
                    <p>層次分明的細緻酥皮，包裹著綿密內餡與圓潤蛋黃。</p>
                </div>
            </div>
        </section>
        <section class="market-info">
            <h3>🎪 最新市集動態</h3>
            <p>我們準備了招牌泡芙與精緻手工餅乾，即將在近期的春季市集與大家見面！</p>
        </section>
    </div>
    <footer>
        <p>&copy; 2026 木漏れ日. All rights reserved.</p>
    </footer>
</body>
</html>
